<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Record - Employee Info System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1>EmployeeHub</h1>
                <span>Management System</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
                <a href="employee-list.html" class="active">
                    <span class="nav-icon">👥</span> Employees
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" onclick="logout()">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div>
                        <div class="user-name" id="user-display-name">Admin</div>
                        <div class="user-role">Click to logout</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content fade-in">
            <button onclick="goBack()" class="btn-ghost btn-sm mb-3">← Back to Profile</button>
            
            <div class="page-header">
                <div>
                    <h2>📋 Service Record</h2>
                    <p>Position history for <strong id="emp-name-display">...</strong></p>
                </div>
                <button class="btn-primary" onclick="openModal()">+ Add Record</button>
            </div>
            
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Position</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="records-table">
                        <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Record Modal -->
    <div id="record-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Add Service Record</h2>
            <div id="modal-error" class="error hidden"></div>
            
            <form id="record-form">
                <label>Position</label>
                <input type="text" id="position" placeholder="Position title" required>
                
                <label>Start Date</label>
                <input type="date" id="start-date" required>
                
                <label>End Date</label>
                <input type="date" id="end-date">
                
                <div class="modal-actions">
                    <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/fetch.js"></script>
    <script src="js/service.js"></script>
</body>
</html>
